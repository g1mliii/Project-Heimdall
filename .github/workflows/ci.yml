name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web / shared (pnpm verify)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: heimdall_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d heimdall_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version # single source of truth with local dev (§0.8)
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm check:deps
      - run: pnpm audit:deps
      # The web tests import the published @heimdall/ui entrypoint, whose
      # package exports target dist/. Build it in CI's clean checkout first.
      - run: pnpm --filter @heimdall/ui build
      - run: pnpm verify # lint + typecheck + test across the workspace
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/heimdall_test
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          # Forked and Dependabot PRs cannot access repository secrets; trusted
          # pushes and same-repository human PRs must still exercise live R2.
          R2_LIVE_REQUIRED: ${{ github.event_name == 'push' || (github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository) }}
      - run: pnpm build
      - run: pnpm --filter @heimdall/web exec playwright install --with-deps chromium
      # Cross-platform visual baselines are tracked separately; keep the
      # functional upload flows mandatory on every PR.
      - run: pnpm --filter @heimdall/web test:e2e:functional

  desktop:
    name: Desktop (cargo fmt / clippy / test)
    runs-on: windows-latest
    # No-op until the Tauri client exists (Phase 9). Runs once Cargo.toml lands.
    steps:
      - uses: actions/checkout@v7

      - id: detect
        shell: bash
        run: |
          if [ -f apps/desktop/src-tauri/Cargo.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Desktop client not scaffolded yet — skipping Rust gate."
          fi

      - if: steps.detect.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - if: steps.detect.outputs.present == 'true'
        run: cargo fmt --check --manifest-path apps/desktop/src-tauri/Cargo.toml

      - if: steps.detect.outputs.present == 'true'
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets --all-features --locked -- -D warnings -D clippy::perf

      - if: steps.detect.outputs.present == 'true'
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml
