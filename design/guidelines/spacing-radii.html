<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="Precise, instrument-like — small by default" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-base); padding: var(--space-6); display: flex; gap: var(--space-4); align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: var(--space-2); }
  .box { width: 76px; height: 60px; background: var(--bg-card); border: 1px solid var(--line-2);
         border-top: 2px solid var(--brand-teal); }
  .tok { font: var(--type-data); color: var(--fg-3); font-size: 11px; }
</style>
</head>
<body>
  <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="tok">xs · 4</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="tok">sm · 6</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><span class="tok">md · 10</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="tok">lg · 14</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="tok">xl · 20</span></div>
  <div class="col"><div class="box" style="width:60px;border-radius:var(--radius-pill)"></div><span class="tok">pill</span></div>
</body>
</html>
