<!-- @dsCard group="Spacing" viewport="700x140" name="Spacing Scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-base); padding: var(--space-6); display: flex; align-items: flex-end; gap: var(--space-4); }
  .col { display: flex; flex-direction: column; align-items: center; gap: var(--space-2); }
  .box { background: var(--brand-teal-dim); border: 1px solid var(--brand-teal); border-radius: var(--radius-xs); }
  .tok { font: var(--type-data); color: var(--fg-3); font-size: 11px; }
</style>
</head>
<body>
  <div class="col"><div class="box" style="width:4px;height:4px"></div><span class="tok">1·4</span></div>
  <div class="col"><div class="box" style="width:8px;height:8px"></div><span class="tok">2·8</span></div>
  <div class="col"><div class="box" style="width:12px;height:12px"></div><span class="tok">3·12</span></div>
  <div class="col"><div class="box" style="width:16px;height:16px"></div><span class="tok">4·16</span></div>
  <div class="col"><div class="box" style="width:24px;height:24px"></div><span class="tok">6·24</span></div>
  <div class="col"><div class="box" style="width:32px;height:32px"></div><span class="tok">8·32</span></div>
  <div class="col"><div class="box" style="width:48px;height:48px"></div><span class="tok">12·48</span></div>
  <div class="col"><div class="box" style="width:64px;height:64px"></div><span class="tok">16·64</span></div>
</body>
</html>
