<!-- @dsCard group="Components" viewport="700x360" name="Feedback · Diagnostics, Meters, Tooltip" subtitle="Auto-advice callouts, utilization meters, spinners" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { background: var(--bg-base); padding: var(--space-6); }
  .grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: var(--space-6); align-items: start; }
  .lab { display: block; font: var(--type-overline); letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--fg-3); margin-bottom: var(--space-3); }
  .stack { display: flex; flex-direction: column; gap: var(--space-3); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script type="text/babel">
    const { Diagnostic, Meter, Tooltip, Spinner } = window.HeimdallDesignSystem_da7d5f;
    function Demo() {
      return (
        <div className="grid">
          <div className="stack">
            <span className="lab">Diagnostics</span>
            <Diagnostic severity="warn" title="RAM below rated speed">Running at 4800 MHz vs rated 6000 — enable EXPO/XMP in BIOS.</Diagnostic>
            <Diagnostic severity="bad" title="VRAM saturation stutters">Spikes correlate with 100% VRAM. Lower texture quality.</Diagnostic>
            <Diagnostic severity="good" title="No issues detected">This run looks clean.</Diagnostic>
          </div>
          <div className="stack">
            <span className="lab">Meters</span>
            <Meter label="GPU load" value={97} display="97%" />
            <Meter label="VRAM" value={11.4} max={12} display="11.4 / 12 GB" color="var(--bad)" />
            <Meter label="CPU load" value={38} display="38%" color="var(--warn)" />
            <span className="lab" style={{marginTop:'12px'}}>Tooltip &amp; Spinner</span>
            <div style={{display:'flex',alignItems:'center',gap:'20px',color:'var(--fg-2)'}}>
              <Tooltip content="Mean of the slowest 0.1% of frames"><span style={{display:'inline-flex',gap:'4px',alignItems:'center',font:'var(--type-body-sm)'}}>0.1% low <i data-lucide="circle-help" style={{width:'15px'}}></i></span></Tooltip>
              <Spinner label="Parsing…" />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
    setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
  </script>
</body>
</html>
