<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="11 → 68px, display + body roles" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-base); padding: var(--space-6); }
  .r { display: flex; align-items: baseline; gap: var(--space-4); padding: var(--space-1) 0; border-bottom: 1px solid var(--line-1); }
  .r:last-child { border-bottom: none; }
  .tok { font: var(--type-data); color: var(--fg-3); width: 96px; flex: none; }
  .spec { color: var(--fg-1); font-family: var(--font-display); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="r"><span class="tok">5xl · 68</span><span class="spec" style="font-size:var(--text-5xl); font-weight:700; letter-spacing:-.02em;">Stutter</span></div>
  <div class="r"><span class="tok">3xl · 40</span><span class="spec" style="font-size:var(--text-3xl); font-weight:700;">Frame-time</span></div>
  <div class="r"><span class="tok">2xl · 31</span><span class="spec" style="font-size:var(--text-2xl); font-weight:600;">Run summary</span></div>
  <div class="r"><span class="tok">xl · 24</span><span class="spec" style="font-size:var(--text-xl); font-weight:600;">Section title</span></div>
  <div class="r"><span class="tok">lg · 20</span><span class="spec" style="font-size:var(--text-lg); font-weight:600;">Card title</span></div>
  <div class="r"><span class="tok">base · 15</span><span class="spec" style="font-size:var(--text-base); font-family:var(--font-sans);">Body default</span></div>
  <div class="r"><span class="tok">sm · 13</span><span class="spec" style="font-size:var(--text-sm); font-family:var(--font-sans); color:var(--fg-2);">Secondary label</span></div>
  <div class="r"><span class="tok">xs · 12</span><span class="spec" style="font-size:var(--text-xs); font-family:var(--font-sans); color:var(--fg-3);">Caption</span></div>
</body>
</html>
