<!-- @dsCard group="Type" viewport="700x180" name="Display · Space Grotesk" subtitle="Mechanical grotesque for headings & hero" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-base); padding: var(--space-6); }
  .ey { font: var(--type-overline); letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--brand-teal); }
  .hero { font: var(--type-display); color: var(--fg-1); letter-spacing: var(--tracking-tight); margin-top: var(--space-2); }
  .sub { font: var(--type-heading); color: var(--fg-2); font-weight: var(--weight-medium); margin-top: var(--space-3); }
  .meta { font: var(--type-data); color: var(--fg-3); margin-top: var(--space-3); }
</style>
</head>
<body>
  <div class="ey">Frame-perfect</div>
  <div class="hero">See every stutter.</div>
  <div class="sub">Heading 600 · –0.01em tracking</div>
  <div class="meta">Space Grotesk · 400 / 500 / 600 / 700</div>
</body>
</html>
